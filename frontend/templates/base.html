<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
    {% block style %}{% endblock %}
</head>
<body>
    <header>
        <h1>
            <a href="/">
                <img src="{{ url_for('static', filename='img/logoFcar.jpg')}}" alt="Fcar">
            </a>
        </h1>
        <nav>
            <a href="/" class="{{ 'active' if request.path == '/' }}">Sobre</a>
            <a href="/contato" class="{{ 'active' if request.path == '/contato' }}">Contato</a>
            <a href="/localizacao" class="{{ 'active' if request.path == '/localizacao' }}">Localização</a>
            <a href="/pecas" class="{{ 'active' if request.path == '/pecas' }}">Catálogo de peças</a>
            <a href="/oleo" class="{{ 'active' if request.path == '/oleo' }}">Aplicação de óleo</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <nav>
            <a href="/" class="{{ 'active' if request.path == '/' }}">Sobre</a>
            <a href="/contato" class="{{ 'active' if request.path == '/contato' }}">Contato</a>
            <a href="/localizacao" class="{{ 'active' if request.path == '/localizacao' }}">Localização</a>
            <a href="/pecas" class="{{ 'active' if request.path == '/pecas' }}">Catálogo de peças</a>
            <a href="/oleo" class="{{ 'active' if request.path == '/oleo' }}">Aplicação de óleo</a>
        </nav>
        
        &copy; Fcar automotiva - Todos os direitos reservados.
    </footer>

</body>
</html>
